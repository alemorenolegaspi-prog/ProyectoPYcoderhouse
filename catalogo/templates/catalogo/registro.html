{% extends 'catalogo/base.html' %}
{% block title %}Crear cuenta{% endblock %}

{% block content %}
<div class="panel" style="max-width: 480px; margin: 0 auto;">
    <h1>Crear cuenta</h1>
    <p style="color: var(--muted);">Sumate para cargar, editar y descubrir nuevos fonogramas.</p>

    <form method="POST" class="form-grid">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary" style="width: 100%;">Registrarse</button>
    </form>

    <div style="margin-top: 16px; text-align: center;">
        <a href="{% url 'home' %}" class="btn-secondary" style="display: inline-flex;">← Volver al inicio</a>
    </div>
</div>
{% endblock %}
